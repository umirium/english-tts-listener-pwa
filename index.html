<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0b0f14" />
  <title>English TTS Listener</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root { --bg:#0b0f14; --card:#121821; --text:#e5edf6; --muted:#9aa7b5; --line:#2b3644; --accent:#7cc4ff; --ok:#6ee7b7; --warn:#fbbf24; --danger:#fca5a5; --highlight:#ff4fa3; --highlight-bg:rgba(255,79,163,.14); }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif; background:radial-gradient(circle at top, rgba(124,196,255,.08), transparent 30%),linear-gradient(180deg, #0a0e13 0%, #0b0f14 100%); color:var(--text); line-height:1.5; }
    .wrap { max-width:860px; margin:0 auto; padding:16px; padding-bottom:calc(190px + env(safe-area-inset-bottom)); }
    .card { background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01)); border:1px solid var(--line); border-radius:22px; padding:16px; margin-bottom:16px; box-shadow:0 8px 24px rgba(0,0,0,.28); backdrop-filter:blur(8px); }
    .card.header-card { padding:10px 14px; }
    .app-header { display:flex; align-items:center; gap:10px; }
    .version-text { display:block; margin-top:2px; color:var(--muted); font-size:12px; letter-spacing:.02em; }
    .app-icon { width:32px; height:32px; border-radius:10px; background:linear-gradient(180deg, #223447, #15202c); display:grid; place-items:center; font-size:16px; border:1px solid #314255; color:#fff; flex:0 0 auto; }
    h1 { margin:0; font-size:18px; letter-spacing:.01em; font-weight:700; }
    label { display:block; font-weight:700; margin-bottom:8px; letter-spacing:.01em; }
    select { width:100%; }
    select { border:1px solid var(--line); border-radius:14px; padding:12px; background:#0f141b; color:var(--text); font-size:16px; outline:none; }
    select:disabled { opacity:.55; }
    .range-wrap { border:1px solid var(--line); border-radius:14px; padding:12px 14px; background:#0f141b; }
    .range-top { display:flex; justify-content:space-between; gap:12px; margin-bottom:8px; font-size:14px; }
    .rate-stepper { display:grid; grid-template-columns:44px 1fr 44px; gap:10px; align-items:center; }
    .rate-step-btn { min-height:44px; padding:0; border-radius:12px; font-size:20px; line-height:1; }
    .rate-display { border:1px solid var(--line); border-radius:12px; min-height:44px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:18px; background:rgba(255,255,255,.02); }
    .editor-wrap, .reading-wrap { width:100%; }
    textarea { width:100%; min-height:62vh; border:1px solid var(--line); border-radius:16px; padding:16px; font-size:20px; line-height:1.7; resize:vertical; background:#0f141b; color:var(--text); outline:none; -webkit-text-size-adjust:100%; }
    textarea:focus { border-color:#4b6a87; box-shadow:0 0 0 3px rgba(124,196,255,.12); }
    .reading-wrap { display:none; min-height:62vh; border:1px solid var(--line); border-radius:16px; background:#0f141b; padding:14px; overflow:auto; touch-action:pan-y; }
    .sentence-list { display:grid; gap:10px; }
    button { touch-action: manipulation; }
    .sentence-item { touch-action: manipulation; border:1px solid var(--line); border-radius:14px; padding:12px 14px; background:rgba(255,255,255,.02); transition:background-color .15s ease,border-color .15s ease,transform .15s ease; line-height:1.8; font-size:19px; word-break:break-word; }
    .sentence-item.active { background:var(--highlight-bg); border-color:var(--highlight); color:#fff; box-shadow:0 0 0 1px rgba(255,79,163,.25) inset; transform:translateY(-1px); }
    .sentence-item.selected { outline:2px solid rgba(124,196,255,.75); outline-offset:1px; }
    .sentence-index { display:block; color:var(--muted); font-size:12px; margin-bottom:6px; }
    .saved-list { display:grid; gap:12px; }
    .saved-item { border:1px solid var(--line); border-radius:18px; padding:14px; background:linear-gradient(180deg, #131b24, #10161e); }
    .saved-top { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:10px; }
    .saved-preview { font-size:15px; line-height:1.5; color:var(--text); word-break:break-word; flex:1; }
    .saved-date { font-size:12px; color:var(--muted); white-space:nowrap; }
    .saved-meta { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:10px; margin-top:10px; }
    .meta-box { border:1px solid var(--line); border-radius:14px; padding:10px; background:rgba(255,255,255,.02); }
    .mk { font-size:11px; color:var(--muted); margin-bottom:4px; }
    .mv { font-size:18px; font-weight:800; }
    .saved-actions { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
    .saved-actions button { padding:10px 14px; font-size:14px; border-radius:12px; min-height:44px; }
    .danger { color:var(--danger); border-color:rgba(252,165,165,.4); }
    .empty { color:var(--muted); font-size:14px; }
    button { appearance:none; border:1px solid var(--line); background:linear-gradient(180deg, #17202a, #121922); color:var(--text); border-radius:16px; padding:14px 12px; font-size:16px; font-weight:800; cursor:pointer; min-height:52px; }
    button.primary { background:linear-gradient(180deg, #89d0ff, #61b8ff); color:#05111d; border-color:#8fd2ff; }
    button:disabled { opacity:.45; cursor:default; }
    #togglePlayBtn { position:relative; touch-action:none; user-select:none; -webkit-user-select:none; transition:transform .16s ease, box-shadow .16s ease, filter .16s ease; will-change:transform, box-shadow; overflow:hidden; }
    #togglePlayBtn::before, #togglePlayBtn::after { position:absolute; top:50%; transform:translateY(-50%); font-size:14px; font-weight:900; opacity:.28; pointer-events:none; transition:opacity .16s ease, transform .16s ease; }
    #togglePlayBtn::before { content:"←"; left:10px; }
    #togglePlayBtn::after { content:"→"; right:10px; }
    #togglePlayBtn.gesture-active { transform:scale(1.03); box-shadow:0 0 0 2px rgba(137,208,255,.32), 0 10px 24px rgba(97,184,255,.22); filter:saturate(1.08); }
    #togglePlayBtn.gesture-swipe-left { transform:translateX(-10px) scale(1.03); box-shadow:0 0 0 2px rgba(252,165,165,.34), 0 10px 24px rgba(252,165,165,.18); }
    #togglePlayBtn.gesture-swipe-right { transform:translateX(10px) scale(1.03); box-shadow:0 0 0 2px rgba(110,231,183,.34), 0 10px 24px rgba(110,231,183,.18); }
    #togglePlayBtn.gesture-swipe-left::before { opacity:.9; transform:translateY(-50%) translateX(-4px) scale(1.15); }
    #togglePlayBtn.gesture-swipe-right::after { opacity:.9; transform:translateY(-50%) translateX(4px) scale(1.15); }
    .settings-overlay { position:fixed; inset:0; z-index:29; background:rgba(0,0,0,0.01); opacity:0; pointer-events:none; }
    .settings-overlay.show { opacity:1; pointer-events:auto; }
    .bottom-controls { position:fixed; left:0; right:0; bottom:0; z-index:30; padding:10px 12px calc(10px + env(safe-area-inset-bottom)); background:rgba(8,12,17,.95); backdrop-filter:blur(10px); border-top:1px solid var(--line); overscroll-behavior:contain; }
    .bottom-inner { max-width:860px; margin:0 auto; display:grid; gap:10px; }
    .bottom-status-row { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .status-fixed { display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,.02); color:var(--muted); font-size:13px; font-weight:700; }
    .dot { width:10px; height:10px; border-radius:50%; background:var(--warn); box-shadow:0 0 0 0 rgba(251,191,36,.35); }
    .dot.running { background:var(--ok); animation:pulse 1.4s infinite; }
    @keyframes pulse { 0% { box-shadow:0 0 0 0 rgba(110,231,183,.35);} 70% { box-shadow:0 0 0 10px rgba(110,231,183,0);} 100% { box-shadow:0 0 0 0 rgba(110,231,183,0);} }
    .status-actions { display:flex; align-items:center; gap:8px; }
    .compact-btn { font-size:13px; min-height:38px; padding:8px 10px; border-radius:12px; white-space:nowrap; }
    .compact-btn.icon-only { min-width:38px; padding:8px; }
    .compact-btn.active { background:linear-gradient(180deg, #89d0ff, #61b8ff); color:#05111d; border-color:#8fd2ff; }
    .bottom-settings { display:block; border:1px solid var(--line); border-radius:16px; padding:0 12px; background:rgba(255,255,255,.02); overflow:hidden; max-height:0; opacity:0; transform:translateY(-6px); transition:max-height .28s ease, opacity .22s ease, transform .22s ease, padding-top .22s ease, padding-bottom .22s ease; pointer-events:none; }
    .bottom-settings.show { max-height:260px; opacity:1; transform:translateY(0); padding-top:12px; padding-bottom:12px; pointer-events:auto; overscroll-behavior:contain; }
    .settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .small-field label { font-size:12px; margin-bottom:6px; }
    .small-field select { padding:10px; font-size:14px; }
    .small-field .range-wrap { padding:10px 12px; }
    .small-field .range-top { font-size:12px; }
    .bottom-top { display:grid; grid-template-columns:minmax(0, 2.4fr) minmax(0, 1fr); gap:10px; }
    .bottom-top #togglePlayBtn { font-size:20px; }
    @media (max-width:640px) {
      .wrap { padding:12px; padding-bottom:calc(210px + env(safe-area-inset-bottom)); }
      textarea { min-height:64vh; }
      .reading-wrap { height:64vh; max-height:64vh; }
      textarea { font-size:21px; line-height:1.75; padding:18px 16px; }
      button { touch-action: manipulation; }
      .sentence-item { touch-action: manipulation; font-size:20px; line-height:1.8; }
      h1 { font-size:24px; }
      .saved-meta, .settings-grid { grid-template-columns:1fr; }
      .bottom-status-row { align-items:center; flex-direction:row; }
      .bottom-top { grid-template-columns:minmax(0, 2.6fr) minmax(0, 1fr); gap:8px; }
      .bottom-top button { font-size:15px; min-height:54px; padding:12px 8px; }
      .bottom-top #togglePlayBtn { font-size:22px; }
      .status-actions { gap:6px; }
      .compact-btn { font-size:12px; min-height:34px; padding:6px 8px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card header-card">
      <div class="app-header">
        <div class="app-icon">🔊</div>
        <div><h1>English TTS Listener</h1><small id="appVersion" class="version-text">Version --</small></div>
      </div>
    </div>

    <div class="card">
      <label for="text">英文</label>
      <div id="editorWrap" class="editor-wrap">
        <textarea id="text" placeholder="ここに英字テキストを貼り付けてください"></textarea>
      </div>
      <div id="readingWrap" class="reading-wrap">
        <div id="sentenceList" class="sentence-list"></div>
      </div>
      
    </div>

    <div class="card">
      <label>保存済みテキスト</label>
      <div id="savedList" class="saved-list"></div>
      <div id="emptyState" class="empty">まだ保存されたテキストはありません。</div>
    </div>
  </div>

  <div id="settingsOverlay" class="settings-overlay"></div>
<div class="bottom-controls">
    <div class="bottom-inner">
      <div class="bottom-status-row">
        <div class="status-fixed"><span id="statusDot" class="dot"></span><span id="statusText">待機中</span></div>
        <div class="status-actions">
          <button id="randomToggleBtn" class="compact-btn" aria-pressed="false" title="ランダム再生">🔀</button>
          <button id="repeatToggleBtn" class="compact-btn" aria-pressed="false" title="同じ文をリピート">🔁</button>
          <button id="autoplayToggleBtn" class="compact-btn" aria-pressed="true" title="次の文を自動再生">⏭️</button>
          <button id="playbackUnitToggleBtn" class="compact-btn" aria-pressed="false" title="再生単位（文/全文）">文</button>
          <button id="saveBtn" class="compact-btn">保存</button>
          <button id="toggleSettingsBtn" class="compact-btn icon-only" aria-label="設定" title="設定">⚙️</button>
        </div>
      </div>
      <div id="bottomSettings" class="bottom-settings">
        <div class="settings-grid">
          <div class="small-field">
            <label for="voiceSelect">音声モデル</label>
            <select id="voiceSelect"></select>
          </div>
          <div class="small-field">
            <label for="rateDownBtn">再生速度</label>
            <div class="range-wrap">
              <div class="range-top"><span>Rate</span><span>0.1 〜 2.0</span></div>
              <div class="rate-stepper">
                <button id="rateDownBtn" class="rate-step-btn" aria-label="再生速度を下げる">−</button>
                <div id="rateValue" class="rate-display">1.0x</div>
                <button id="rateUpBtn" class="rate-step-btn" aria-label="再生速度を上げる">＋</button>
              </div>
            </div>
          </div>

        </div>
      </div>
      <div class="bottom-top">
        <button id="togglePlayBtn" class="primary">再生</button>
        <button id="stopBtn">停止</button>
      </div>
    </div>
  </div>

  <script src="storage.js"></script>
  <script src="speech.js"></script>
  <script src="app.js"></script>
</body>
</html>
